<!doctype html>
<html>
    <head>
        <script defer type="module" src="script.js"></script>
        <link rel = "stylesheet" href="style.css"></link>
    </head>
    <body>
        <div class="wrapper">
    
            <div class="half">
                <h2>Modulator</h2>
                <label for = "text_input">Enter text to be modulated:</label>
                <textarea id="text_input" ></textarea>
                
                <div>
                    <button id="play_button">play</button><button id="stop_button">stop</button>
                </div>
            </div><div class="half">
                <h2>Demodulator</h2>
                
                <div>
                    <label for = "text_output">Demodulated text:</label>
                
                    <textarea id="text_output" ></textarea>
                
                    <button id="record_button">record</button><button id="stop_record_button">stop</button>
                    <canvas id = "oscilloscope"></canvas>
                    <label for="vertical">vertical scale</label>
                    <input type="range" id="vertical" min="0" max="50" value="0" step="1" />
                    <label for="horizontal">horizontal scale</label>
                    <input type="range" id="horizontal" min="100" max="2000" value="2000" step="1" />
                    
                    <canvas id = "stars"></canvas>
                    <!--<input type="range" id="scale" min="1" max="1000" value="1" step="1" />-->
    
  
                </div>
            </div>
        </div>
    </body>
</html>
